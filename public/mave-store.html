const productFromUrl = () => {
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('product');
  return slug ? PRODUCTS.find(p => p.slug === slug) || null : null;
};

const viewFromUrl = () => {
  if (window.location.pathname === '/science') return 'science';
  const params = new URLSearchParams(window.location.search);
  return params.get('view') === 'catalog' ? 'catalog' : 'landing';
};

const setProductUrl = product => {
  const url = new URL(window.location.href);
  if (product) url.searchParams.set('product', product.slug);
  else url.searchParams.delete('product');
  if (product) url.searchParams.delete('view');
  window.history.pushState({}, '', url);
};

const setViewUrl = view => {
  const url = new URL(window.location.href);
  url.pathname = '/mave-store.html';
  url.searchParams.delete('product');
  url.hash = '';
  if (view === 'science') {
    url.pathname = '/science';
    window.history.pushState({}, '', url);
    return;
  }
  if (view === 'catalog') url.searchParams.set('view', 'catalog');
  else url.searchParams.delete('view');
  window.history.pushState({}, '', url);
};

const syncCartForNextCheckout = cart => {
  const toNumber = value => Number(String(value || '').replace(/[^\d.,]/g, '').replace(',', '.')) || 0;
  const toPath = value => String(value || '').startsWith('/') ? value : `/${value}`;
  const items = cart.map(item => ({
    product: {
      id: item.slug || String(item.id),
      name: item.name,
      price: toNumber(item.price),
      shortDescription: item.desc || '',
      description: item.desc || '',
      step: item.collection || '',
      image: toPath(item.image),
      ingredients: [],
      benefits: [],
      size: item.vol || '',
    },
    quantity: item.qty,
  }));
  localStorage.setItem('mave-cart', JSON.stringify({ state: { items }, version: 0 }));
};

            transition={{ duration: 0.28, ease: [0.23, 1, 0.32, 1] }}
            onClick={() => setLightbox(false)}
            style={{ position: 'fixed', inset: 0, zIndex: 900, background: 'rgba(26,20,16,0.92)', display: 'grid', placeItems: 'center', padding: 42, cursor: 'zoom-out' }}>
            <button onClick={e => { e.stopPropagation(); setLightbox(false); }}
              aria-label="Close image view"
              style={{ position: 'absolute', right: 34, top: 28, width: 42, height: 42, background: 'rgba(245,240,232,0.08)', border: `1px solid rgba(245,240,232,0.18)`, color: C.cream, cursor: 'pointer', fontSize: 28, lineHeight: 1, display: 'grid', placeItems: 'center' }}>
              ×
            </button>
            <motion.img src={activeImage} alt={product.name}
              onClick={e => e.stopPropagation()}
              initial={{ opacity: 0, scale: 0.98 }} animate={{ opacity: 1, scale: 1 }} exit={{ opacity: 0, scale: 0.98 }}
              transition={{ duration: 0.42, ease: [0.23, 1, 0.32, 1] }}
              style={{ maxWidth: 'min(1180px, 92vw)', maxHeight: '86vh', objectFit: 'contain', filter: 'saturate(0.9)' }} />
          </motion.div>
        )}
      </AnimatePresence>
      <Footer />
    </motion.main>
  );
};

/* в”Ђв”Ђ PRODUCT DRAWER в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
const ProductDrawer = ({ product, onClose, onAdd }) => {
  const [qty, setQty] = React.useState(1);
  const [added, setAdded] = React.useState(false);
  React.useEffect(() => { if (product) { setQty(1); setAdded(false); } }, [product]);
  React.useEffect(() => {
    const h = e => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [onClose]);
  const handleAdd = () => {
    onAdd(product, qty);
    setAdded(true);
    setTimeout(() => { setAdded(false); onClose(); }, 1500);
  };

  return (
    <AnimatePresence>
      {product && (
        <>
          <motion.div key="bd" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}
            onClick={onClose} style={{ position: 'fixed', inset: 0, background: 'rgba(26,20,16,0.55)', zIndex: 600, backdropFilter: 'blur(6px)' }} />
          <motion.div key="dw" initial={{ y: '100%' }} animate={{ y: 0 }} exit={{ y: '100%' }}
            transition={{ duration: 0.52, ease: [0.4, 0, 0.2, 1] }}
            style={{ position: 'fixed', bottom: 0, left: 0, right: 0, zIndex: 601, maxHeight: '86vh', background: C.cream, display: 'grid', gridTemplateColumns: '1fr 1.3fr', boxShadow: '0 -24px 80px rgba(26,20,16,0.28)' }}>
            <div style={{ overflow: 'hidden', maxHeight: '86vh' }}>
              <motion.img src={product.image} alt={product.name} initial={{ scale: 1.08 }} animate={{ scale: 1 }}
                transition={{ duration: 0.7 }} style={{ width: '100%', height: '100%', objectFit: 'cover', filter: 'saturate(0.88)' }} />
            </div>
            <div style={{ padding: '52px 60px', overflowY: 'auto', display: 'flex', flexDirection: 'column', justifyContent: 'center', position: 'relative' }}>
              <button onClick={onClose} style={{ position: 'absolute', top: 20, right: 24, background: 'none', border: 'none', cursor: 'pointer', color: C.gray, fontSize: 22, lineHeight: 1, transition: 'color 0.3s' }}
                onMouseEnter={e => e.target.style.color = C.black} onMouseLeave={e => e.target.style.color = C.gray}>×</button>
              <span style={{ fontFamily: "'Montserrat',sans-serif", fontSize: 9, fontWeight: 400, letterSpacing: '0.32em', textTransform: 'uppercase', color: C.gold, display: 'block', marginBottom: 14 }}>{product.collection}</span>
              <h2 style={{ fontFamily: "'Montserrat',sans-serif", fontSize: 'clamp(18px,2vw,28px)', fontWeight: 200, letterSpacing: '0.26em', textTransform: 'uppercase', color: C.black, lineHeight: 1.3, marginBottom: 10 }}>{product.name}</h2>
              <div style={{ width: 36, height: 2, background: product.accent, marginBottom: 28 }}></div>
              <p style={{ fontFamily: "'Montserrat',sans-serif", fontSize: 14, fontWeight: 300, lineHeight: 1.95, letterSpacing: '0.03em', color: C.earth, marginBottom: 20 }}>{product.desc}</p>
              <div style={{ borderTop: `1px solid ${C.linen}`, borderBottom: `1px solid ${C.linen}`, padding: '18px 0', marginBottom: 32 }}>
              <span style={{ fontFamily: "'Montserrat',sans-serif", fontSize: 11, fontWeight: 300, letterSpacing: '0.08em', color: C.gray, display: 'block', marginBottom: 8 }}>Formula role</span>
                <span style={{ fontFamily: "'Montserrat',sans-serif", fontSize: 28, fontWeight: 300, color: C.black }}>{product.price}</span>
              </div>
              <div style={{ display: 'flex', gap: 12, marginBottom: 14 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 16, border: `1px solid ${C.taupe}`, padding: '0 18px' }}>
                  <button onClick={() => setQty(q => Math.max(1, q - 1))} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 18, color: C.black, padding: '13px 0', lineHeight: 1 }}>−</button>
                  <span style={{ fontFamily: "'Montserrat',sans-serif", fontSize: 13, fontWeight: 300, color: C.black, minWidth: 22, textAlign: 'center' }}>{qty}</span>
                  <button onClick={() => setQty(q => q + 1)} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 18, color: C.black, padding: '13px 0', lineHeight: 1 }}>+</button>
                </div>
                <motion.button onClick={handleAdd} whileTap={{ scale: 0.97 }}
                  style={{ flex: 1, padding: '15px 24px', background: added ? C.gold : C.black, color: added ? C.black : C.gold, fontFamily: "'Montserrat',sans-serif", fontSize: 10, fontWeight: 400, letterSpacing: '0.28em', textTransform: 'uppercase', border: 'none', cursor: 'pointer', transition: 'background 0.4s, color 0.4s' }}>
                  {added ? 'Added ✓' : 'Add to cart'}
                </motion.button>
              </div>
              <span style={{ fontFamily: "'Montserrat',sans-serif", fontSize: 10, fontWeight: 300, letterSpacing: '0.1em', color: C.gray, textAlign: 'center' }}>Free shipping on orders over €120 · 30-day returns</span>
            </div>
          </motion.div>
        </>
      )}
    </AnimatePresence>
  );
};

/* в”Ђв”Ђ CART SIDEBAR в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */

            style={{ position: 'fixed', top: 0, right: 0, bottom: 0, width: 410, background: C.cream, zIndex: 701, display: 'flex', flexDirection: 'column', boxShadow: '-16px 0 64px rgba(26,20,16,0.18)' }}>

              ? <p style={{ fontFamily: "'Montserrat',sans-serif", fontSize: 12, fontWeight: 300, color: C.gray, letterSpacing: '0.05em' }}>Your cart is empty.</p>
              : cart.map((item, i) => (
                  <motion.div key={i} initial={{ opacity: 0, x: 20 }} animate={{ opacity: 1, x: 0 }} transition={{ delay: i * 0.07 }}
                    style={{ display: 'flex', gap: 18, marginBottom: 26, paddingBottom: 26, borderBottom: `1px solid rgba(107,87,68,0.14)` }}>
                    <img src={item.image} alt={item.name} style={{ width: 84, height: 104, objectFit: 'cover', filter: 'saturate(0.88)' }} />
                    <div style={{ flex: 1, paddingTop: 2 }}>
                      <span style={{ fontFamily: "'Montserrat',sans-serif", fontSize: 8, letterSpacing: '0.22em', textTransform: 'uppercase', color: C.gray, display: 'block', marginBottom: 7 }}>{item.collection}</span>
                      <span style={{ fontFamily: "'Montserrat',sans-serif", fontSize: 12, fontWeight: 400, letterSpacing: '0.14em', textTransform: 'uppercase', color: C.black, display: 'block', marginBottom: 9 }}>{item.name}</span>
                      <span style={{ fontFamily: "'Montserrat',sans-serif", fontSize: 12, fontWeight: 300, color: C.bark, display: 'block', marginBottom: 14 }}>{item.price}</span>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
                        <div style={{ display: 'flex', alignItems: 'center', border: `1px solid rgba(107,87,68,0.28)`, height: 34 }}>
                          <button onClick={() => onQtyChange(item.id, -1)} aria-label={`Decrease ${item.name} quantity`} style={{ width: 34, height: 32, background: 'none', border: 'none', cursor: 'pointer', color: C.black, fontSize: 16, lineHeight: 1 }}>−</button>
                          <span style={{ minWidth: 24, textAlign: 'center', fontFamily: "'Montserrat',sans-serif", fontSize: 12, fontWeight: 300, color: C.black }}>{item.qty}</span>
                          <button onClick={() => onQtyChange(item.id, 1)} aria-label={`Increase ${item.name} quantity`} style={{ width: 34, height: 32, background: 'none', border: 'none', cursor: 'pointer', color: C.black, fontSize: 16, lineHeight: 1 }}>+</button>
                        </div>
                        <button onClick={() => onRemove(item.id)}
                          aria-label={`Remove ${item.name} from cart`}
                          style={{ background: 'none', border: 'none', borderBottom: `1px solid rgba(200,169,110,0.58)`, color: C.gray, cursor: 'pointer', fontFamily: "'Montserrat',sans-serif", fontSize: 9, fontWeight: 400, letterSpacing: '0.18em', textTransform: 'uppercase', padding: '0 0 5px' }}>
                          Remove
                        </button>
                      </div>
                    </div>
                  </motion.div>
                ))
            }
          </div>
          {cart.length > 0 && (
            <div style={{ padding: '26px 34px 30px', borderTop: `1px solid rgba(107,87,68,0.16)` }}>
              <div style={{ padding: '0 0 22px', marginBottom: 24, borderBottom: `1px solid rgba(107,87,68,0.12)` }}>
                <span style={{ fontFamily: "'Montserrat',sans-serif", fontSize: 11, fontWeight: 300, letterSpacing: '0.06em', color: C.bark, display: 'block', marginBottom: 6 }}>Shipping calculated at checkout</span>
                <span style={{ fontFamily: "'Montserrat',sans-serif", fontSize: 11, fontWeight: 300, letterSpacing: '0.06em', color: C.gray }}>Free shipping over €120</span>
              </div>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 24 }}>
                <span style={{ fontFamily: "'Montserrat',sans-serif", fontSize: 10, letterSpacing: '0.18em', textTransform: 'uppercase', color: C.bark }}>Total</span>
                <span style={{ fontFamily: "'Montserrat',sans-serif", fontSize: 24, fontWeight: 300, letterSpacing: '0.04em', color: C.black }}>€{cart.reduce((s,i) => s + parseFloat(i.price.replace('€','')) * i.qty, 0).toFixed(2)}</span>
              </div>
              <button onClick={() => { syncCartForNextCheckout(cart); window.location.href = '/checkout/contact'; }}
                style={{ width: '100%', padding: 18, background: C.black, color: C.gold, fontFamily: "'Montserrat',sans-serif", fontSize: 10, fontWeight: 400, letterSpacing: '0.3em', textTransform: 'uppercase', border: 'none', cursor: 'pointer', transition: 'background 0.4s' }}
                onMouseEnter={e => e.target.style.background = C.earth}
                onMouseLeave={e => e.target.style.background = C.black}
              >Checkout</button>
              <button onClick={onClose} style={{ width: '100%', marginTop: 16, background: 'none', border: 'none', color: C.bark, cursor: 'pointer', fontFamily: "'Montserrat',sans-serif", fontSize: 9, fontWeight: 400, letterSpacing: '0.22em', textTransform: 'uppercase' }}>
                Continue shopping
              </button>
            </div>
          )}
        </motion.div>
      </>
    )}
  </AnimatePresence>
);

          <p style={{ fontFamily: "'Montserrat',sans-serif", fontSize: 12, fontWeight: 300, lineHeight: 1.9, color: 'rgba(245,240,232,0.46)', maxWidth: 300 }}>Molecular system. Controlled depth.</p>

        <span style={{ fontFamily: "'Montserrat',sans-serif", fontSize: 10, fontWeight: 300, letterSpacing: '0.07em', color: 'rgba(245,240,232,0.28)' }}>MAVE® Molecular Cosmetics</span>

/* в”Ђв”Ђ APP в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
const App = () => {
  const [productPage, setProductPage] = React.useState(() => productFromUrl());
  const [view, setView] = React.useState(() => viewFromUrl());
  const [cartOpen, setCartOpen] = React.useState(false);
  const [cart, setCart]         = React.useState([]);

  const addToCart = (product, qty) => {
    setCart(prev => {
      const exists = prev.find(i => i.id === product.id);
      if (exists) return prev.map(i => i.id === product.id ? { ...i, qty: i.qty + qty } : i);
      return [...prev, { ...product, qty }];
    });
    setCartOpen(true);
  };
  const removeFromCart = id => setCart(prev => prev.filter(i => i.id !== id));
  const changeCartQty = (id, delta) => setCart(prev => prev
    .map(i => i.id === id ? { ...i, qty: i.qty + delta } : i)
    .filter(i => i.qty > 0)
  );

  const cartCount = cart.reduce((s, i) => s + i.qty, 0);

  React.useEffect(() => {
    if (productPage) window.scrollTo({ top: 0, behavior: 'smooth' });
  }, [productPage]);
  React.useEffect(() => {
    const onPop = () => {
      setProductPage(productFromUrl());
      setView(viewFromUrl());
    };
    window.addEventListener('popstate', onPop);
    return () => window.removeEventListener('popstate', onPop);
  }, []);
  const openProduct = product => {
    setProductUrl(product);
    setProductPage(product);
    setView('catalog');
  };
  const closeProduct = () => {
    setViewUrl('catalog');
    setProductPage(null);
    setView('catalog');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };
  const openCatalog = () => {
    setViewUrl('catalog');
    setProductPage(null);
    setView('catalog');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };
  const openScience = () => {
    setViewUrl('science');
    setProductPage(null);
    setView('science');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };
  const openLanding = () => {
    setViewUrl('landing');
    setProductPage(null);
    setView('landing');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };
  const openLandingSection = id => {
    setViewUrl('landing');
    setProductPage(null);
    setView('landing');
    setTimeout(() => document.getElementById(id)?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 60);
  };
  const closeCatalog = () => {
    setViewUrl('landing');
    setView('landing');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  return (
    <motion.div
      initial={{ opacity: 0, scale: 1.02 }}
      animate={{ opacity: 1, scale: 1 }}
      exit={{ opacity: 0, scale: 0.98 }}
      transition={{ duration: 0.5 }}
      style={{ background: C.cream, overflowX: 'hidden' }}
    >
      <Header
        cartCount={cartCount}
        onCartOpen={() => setCartOpen(true)}
        onCatalogOpen={openCatalog}
        onHome={openLanding}
        onSectionOpen={openLandingSection}
        onScienceOpen={openScience}
        surface={productPage || view === 'catalog' ? 'light' : 'dark'}
      />
      {productPage ? (
        <ProductPage product={productPage} onBack={closeProduct} onAdd={addToCart} onSelect={openProduct} />
      ) : view === 'science' ? (
        <SciencePage onBack={openLanding} onSelect={openProduct} />
      ) : view === 'catalog' ? (
        <CatalogPage onBack={closeCatalog} onSelect={openProduct} />
      ) : (
        <>
          <Hero onCatalogOpen={openCatalog} />
          <BrandStatement />
          <LiquidReveal onCatalogOpen={openCatalog} />
          <OilDropMoment onCatalogOpen={openCatalog} />
          <RoutineSection onSelect={openProduct} />
          <FeaturedProducts onSelect={openProduct} />
          <Marquee />
          <EditorialTrio onSelect={openProduct} />
          <SplitFeature onSelect={openProduct} onCatalogOpen={openCatalog} />
          <Testimonials />
          <IngredientsStrip />
          <FullBleedCTA onCatalogOpen={openCatalog} />
          <Footer />
        </>
      )}
      <CartSidebar cart={cart} isOpen={cartOpen} onClose={() => setCartOpen(false)} onRemove={removeFromCart} onQtyChange={changeCartQty} />
    </motion.div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
